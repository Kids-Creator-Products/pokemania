name: Pokemania
native_deps: {head_html: ''}
package_name: Pokemania
renamed: true
runtime_options:
  client_version: '3'
  legacy_features: {bootstrap3: true, class_names: true}
  server_spec: {base: python310-minimal}
  version: 3
secrets: {}
services:
- client_config: {enable_v2: false}
  server_config: {auto_create_missing_columns: true}
  source: /runtime/services/tables.yml
- client_config: {allow_mfa_email_reset: false, allow_remember_me: true, allow_signup: true, confirm_email: true, enable_automatically: true, mfa_timeout_days: 0, remember_me_days: 365, require_mfa: false, require_secure_passwords: true, share_login_status: true, use_email: true, use_facebook: true, use_google: true, use_token: true}
  server_config:
    email_content:
      confirm_address:
        html: |-
          <p>Thanks for registering your account with us. Please click the following link to confirm that this is your account:</p>
          <p>{{confirm_link}}</p>
          <p>Thanks,</p>
          <p>The team</p>
      reset_password:
        html: |-
          <p>Hi there,</p>
          <p>You have requested a password reset for your account {{email}}. To reset your password, click the link below:</p>
          <p>{{reset_link}}</p>
          <p>This link will expire in ten minutes.</p>
    user_table: users
  source: /runtime/services/anvil/users.yml
- client_config: {}
  server_config: {app_origin_redirect: false, client_id: ''}
  source: /runtime/services/google.yml
- client_config: {}
  server_config: {}
  source: /runtime/services/facebook.yml
- client_config: {}
  server_config: {}
  source: /runtime/services/anvil/secrets.yml
- client_config: {}
  server_config: {file_table: files}
  source: /runtime/services/anvil/files.yml
